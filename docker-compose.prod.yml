services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - db

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-lost_found_db}
      MYSQL_USER: ${DB_USERNAME:-retrieveit}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
  app_storage:
