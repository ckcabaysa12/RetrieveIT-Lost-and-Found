<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 72" role="img" aria-label="RetrieveIT">
  <defs>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d6a6a"/>
      <stop offset="100%" stop-color="#1e4848"/>
    </linearGradient>
  </defs>

  <!-- Magnifying glass -->
  <circle cx="30" cy="32" r="22" fill="none" stroke="url(#teal)" stroke-width="5"/>
  <line x1="46" y1="48" x2="58" y2="60" stroke="url(#teal)" stroke-width="5" stroke-linecap="round"/>

  <!-- Package inside lens -->
  <rect x="18" y="24" width="18" height="14" rx="1.5" fill="#e8c47a" stroke="#1e4848" stroke-width="1.2"/>
  <line x1="18" y1="28" x2="36" y2="28" stroke="#1e4848" stroke-width="1"/>
  <line x1="18" y1="32" x2="36" y2="32" stroke="#1e4848" stroke-width="1"/>

  <!-- Location pin -->
  <path d="M27 40c-2.8 0-5 2-5 4.4 0 3.2 5 7.6 5 7.6s5-4.4 5-7.6c0-2.4-2.2-4.4-5-4.4z" fill="#2d6a6a"/>
  <circle cx="27" cy="44.4" r="1.6" fill="#fff"/>

  <!-- Wordmark -->
  <text x="78" y="44" font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#2d6a6a">RetrieveIT</text>
